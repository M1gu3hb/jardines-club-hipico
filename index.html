<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Título y descripción principal -->
    <title>Jardines Club Hípico | Salón de Eventos en Xochimilco</title>
    <meta name="description" content="Salón de eventos en Xochimilco para celebraciones, reuniones y eventos memorables. Conoce nuestros espacios, servicios y solicita tu cotización." />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jardines Club Hípico" />
    <meta property="og:title" content="Jardines Club Hípico | Salón de Eventos en Xochimilco" />
    <meta property="og:description" content="Salón de eventos en Xochimilco para celebraciones, reuniones y eventos memorables. Conoce nuestros espacios, servicios y solicita tu cotización." />
    <meta property="og:url" content="https://jardinesclubhipico.com/" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jardines Club Hípico | Salón de Eventos en Xochimilco" />
    <meta name="twitter:description" content="Salón de eventos en Xochimilco para celebraciones, reuniones y eventos memorables. Conoce nuestros espacios, servicios y solicita tu cotización." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- JSON-LD datos estructurados -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Jardines Club Hípico",
      "alternateName": "Jardines Club Hípico Xochimilco",
      "url": "https://jardinesclubhipico.com/"
    }
    </script>

    <!-- JSON-LD negocio local (salón de eventos) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EventVenue",
      "name": "Jardines Club Hípico",
      "description": "Salón y jardines para eventos en Xochimilco, CDMX. 8 espacios, capilla, hospedaje y área infantil — todo tu evento en un solo lugar, de 30 a 600 personas.",
      "image": "https://i.imgur.com/aMxWuH8.png",
      "url": "https://jardinesclubhipico.com/",
      "telephone": "+525548663656",
      "maximumAttendeeCapacity": 600,
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Duraznos S/N, Sta Inés",
        "addressLocality": "Xochimilco",
        "addressRegion": "Ciudad de México",
        "postalCode": "16810",
        "addressCountry": "MX"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 19.2337103,
        "longitude": -99.1114187
      },
      "hasMap": "https://maps.app.goo.gl/HKg8kiUA9gEV9MLf7",
      "sameAs": [
        "https://www.facebook.com/JardinesClubHipico/"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
